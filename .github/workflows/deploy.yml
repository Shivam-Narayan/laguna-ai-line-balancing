name: Deploy to Azure App Service (Dev)

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

env:
  DOCKER_IMAGE_NAME: sshivam6495/laguna-ai-line-balancing-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and Push Backend Image (Prod Target)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: prod
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:latest

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only run deployment on direct pushes/merges to dev, not on PR creation
    if: github.event_name == 'push'
    steps:
      - name: Deploy to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          # Note: Azure App Service with Docker Compose often just requires restarting the app
          # or triggering the webhook for it to pull the latest 'latest' tag image.
