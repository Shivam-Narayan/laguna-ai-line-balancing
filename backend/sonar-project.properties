sonar.projectKey=laguna_ai_backend
sonar.projectName=Laguna AI Backend
sonar.projectVersion=1.0

# Source code location
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Specify exact python version for accurate analysis
sonar.python.version=3.11

# Exclude generated files, environments, and standard django entrypoints
sonar.exclusions=**/migrations/**,**/__pycache__/**,**/*.pyc,.venv/**,venv/**,manage.py,config/wsgi.py,config/asgi.py,config/settings/**

# Tell SonarQube where test files are located
sonar.tests=tests/

# Point to coverage report generated by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml
