services:
  # In production, use the prod build target
  backend:
    build:
      target: prod

  # Background Task Scheduler
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    command: >
      sh -c "python manage.py absenteeism_scheduler &
             python manage.py dataEngine_scheduler &
             python manage.py manning_sheet_scheduler &
             wait"
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_BACKEND: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - logs_volume:/app/logs

  # Production Celery worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: prod
    command: celery -A config worker -l info
    env_file: .env
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      SECRET_KEY: ${SECRET_KEY}
      DB_ENGINE: ${DB_ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: "5432"
      REDIS_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - logs_volume:/app/logs
    restart: unless-stopped

  # Production Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static_files:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped
